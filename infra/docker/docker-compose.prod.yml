services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ai_code_review
      POSTGRES_USER: ai_code_review
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_code_review"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
      target: production
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://ai_code_review:${POSTGRES_PASSWORD}@postgres:5432/ai_code_review
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_URL: ${APP_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      OPENAI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gemini-2.5-flash
      OPENAI_MAX_TOKENS: "4096"
      OPENAI_TEMPERATURE: "0.1"
      ENABLE_VECTOR_SEARCH: "false"
      ENABLE_RAG: "false"
      ENABLE_REAL_TIME_REVIEWS: "true"
      MAX_FILE_SIZE_FOR_REVIEW: "500000"
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX_FREE: "60"
      PINECONE_API_KEY: placeholder
      PINECONE_INDEX: code-embeddings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
