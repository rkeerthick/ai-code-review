apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: ai-code-review

# Production-specific patches
patches:
  # Scale API to 5 replicas in production
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
    target:
      kind: Deployment
      name: api

  # Scale workers to 3 in production
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: review-worker

images:
  - name: your-registry/api
    newTag: "${IMAGE_TAG}"
  - name: your-registry/web
    newTag: "${IMAGE_TAG}"

commonAnnotations:
  deployment-timestamp: "${DEPLOYMENT_TIMESTAMP}"
